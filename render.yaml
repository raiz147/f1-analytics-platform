services:
  - type: web
    name: f1-analytics-api
    runtime: node
    rootDir: backend/api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: OPENF1_BASE_URL
        value: https://api.openf1.org/v1
      - key: ENABLE_SESSION_IMPORTS
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: f1-analytics-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        sync: false
      - key: PIPELINE_WORKDIR
        value: /opt/render/project/src/pipeline
      - key: PIPELINE_PYTHON_PATH
        value: /opt/render/project/src/pipeline/.venv/bin/python

  - type: cron
    name: f1-analytics-pipeline
    runtime: python
    rootDir: pipeline
    schedule: "0 */6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.main sync-recent --year $SYNC_YEAR --limit $SYNC_LIMIT
    envVars:
      - key: OPENF1_BASE_URL
        value: https://api.openf1.org/v1
      - key: OPENF1_TIMEOUT_SECONDS
        value: 30
      - key: SYNC_YEAR
        value: "2025"
      - key: SYNC_LIMIT
        value: "6"
      - key: DATABASE_URL
        fromDatabase:
          name: f1-analytics-db
          property: connectionString

databases:
  - name: f1-analytics-db
    databaseName: f1_analytics
    user: f1

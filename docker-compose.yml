version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: f1-postgres
    environment:
      POSTGRES_DB: f1_analytics
      POSTGRES_USER: f1
      POSTGRES_PASSWORD: f1_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1 -d f1_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
